<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MemoraAI - Reminders</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2,
        #f093fb
    );
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:900px;
}

.glass-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    padding:35px;

    color:white;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2);
}

.glass-card:hover{
    box-shadow:
    0 20px 50px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
}

.input-area{
    display:flex;
    gap:15px;
    margin-bottom:25px;
}

input[type="text"]{
    flex:1;

    padding:18px;

    border:none;

    outline:none;

    border-radius:15px;

    background:
    rgba(255,255,255,0.2);

    color:white;

    font-size:18px;
}

input[type="text"]::placeholder{
    color:rgba(255,255,255,0.8);
}

.add-btn{
    padding:18px 25px;

    border:none;

    border-radius:15px;

    background:white;

    color:#764ba2;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.add-btn:hover{
    transform:translateY(-3px);
    box-shadow:
    0 10px 25px rgba(0,0,0,0.2);
}

#taskList{
    margin-top:20px;
}

.task{
    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 20px;

    margin-bottom:15px;

    background:
    rgba(255,255,255,0.12);

    border-radius:15px;

    transition:0.3s;
}

.task:hover{
    transform:translateX(8px);
    background:
    rgba(255,255,255,0.18);
}

.task span{
    font-size:19px;
    font-weight:500;
}

.task input[type="checkbox"]{
    width:24px;
    height:24px;
    cursor:pointer;
}

.completed{
    text-decoration:line-through;
    opacity:0.6;
}

.footer{
    text-align:center;
    margin-top:25px;
    opacity:0.85;
}

@media(max-width:768px){

    .input-area{
        flex-direction:column;
    }

    h1{
        font-size:32px;
    }

}
@keyframes fadeSlideUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatIcon{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes glow{
    0%,100%{
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    }
    50%{
        box-shadow:0 0 35px rgba(255,255,255,0.35);
    }
}

/* Page Animation */

.container{
    animation:fadeSlideUp .8s ease;
}

.glass-card{
    animation:
    fadeSlideUp 1s ease,
    glow 4s infinite ease-in-out;
}

h1{
    animation:floatIcon 3s infinite ease-in-out;
}

.input-area{
    animation:fadeSlideUp 1.2s ease;
}

input[type="text"]{
    transition:.3s;
}

input[type="text"]:focus{

    transform:scale(1.02);

    background:
    rgba(255,255,255,.3);

    box-shadow:
    0 0 20px rgba(255,255,255,.25);
}

.add-btn{
    animation:fadeSlideUp 1.3s ease;
}

.add-btn:hover{

    transform:
    translateY(-5px)
    scale(1.05);
}

.task{
    animation:fadeSlideUp .8s ease;
}

.task:hover{

    transform:
    translateX(10px)
    scale(1.02);

    box-shadow:
    0 8px 20px rgba(0,0,0,.2);
}

.task input[type="checkbox"]{
    transition:.3s;
}

.task input[type="checkbox"]:checked{
    transform:scale(1.3);
}

.footer{
    animation:fadeSlideUp 1.6s ease;
}

.footer:hover{
    letter-spacing:1px;
}

.new-task{
    animation:fadeSlideUp .5s ease;
}



</style>
</head>

<body>

<div class="container">

<div class="glass-card">

<h1>📋 Reminders</h1>

<div class="input-area">

<input
type="text"
id="reminderInput"
placeholder="Enter a new reminder">

<button
class="add-btn"
onclick="addReminder()">

Add Reminder

</button>

</div>

<div id="taskList">

<div class="task">

<span>
💊 Take Morning Medicine
</span>

<input
type="checkbox"
onchange="toggleTask(this)">

</div>

<div class="task">

<span>
🚶 Morning Walk
</span>

<input
type="checkbox"
onchange="toggleTask(this)">

</div>

<div class="task">

<span>
💧 Drink Water
</span>

<input
type="checkbox"
onchange="toggleTask(this)">

</div>

</div>

<div class="footer">
Smart Healthcare Reminders for Elderly Care
</div>

</div>

</div>

<script>

function addReminder(){

    let input =
    document.getElementById(
        "reminderInput"
    );

    let taskText =
    input.value.trim();

    if(taskText === "")
        return;

    let task =
    document.createElement("div");

    task.className =
    "task new-task";

    task.innerHTML = `

    <span>
    📌 ${taskText}
    </span>

    <input
    type="checkbox"
    onchange="toggleTask(this)">

    `;

    document
    .getElementById("taskList")
    .appendChild(task);

    input.value = "";

}
</script>

</body>
</html>
