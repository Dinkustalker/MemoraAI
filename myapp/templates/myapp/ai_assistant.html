<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>

<style>
body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);
    padding:40px;
}

.glass-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:30px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

.btn{
    padding:16px 30px;
    border:none;
    border-radius:15px;
    background:white;
    color:#764ba2;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    margin-top:15px;
}

input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:17px;
    outline:none;
    margin-top:10px;
}

input::placeholder{
    color:rgba(255,255,255,0.8);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
}

.chat{
    max-width:1000px;
    margin:auto;
    border-radius:25px;
    padding:30px;
}

.message{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    padding:20px;
    margin-top:20px;
    border-radius:15px;
    line-height:1.6;
}
@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatTitle{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-6px);
    }
}

body{
    animation:fadeInUp 0.8s ease;
}

.chat{
    animation:fadeInUp 1s ease;
}

.glass-card{
    animation:fadeInUp 1.2s ease;
    transition:0.4s;
}

.glass-card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h1{
    animation:floatTitle 3s ease-in-out infinite;
}

input{
    transition:0.3s;
}

input:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.btn{
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.message{
    animation:fadeInUp 1.4s ease;
    transition:0.3s;
}

.message:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="chat">
    <div class="glass-card">

        <h1>AI Assistant</h1>

        <form method="POST">
            {% csrf_token %}

            <input
            type="text"
            name="question"
            placeholder="Type your message..."
            required>

            <button class="btn" type="submit">
                Ask
            </button>
        </form>

        <div class="message">
            {% if answer %}
                {{ answer }}
            {% else %}
                How can I help you today?
            {% endif %}
        </div>

    </div>
</div>

</body>
</html>
