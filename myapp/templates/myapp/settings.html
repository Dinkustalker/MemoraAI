<!DOCTYPE html>
<html>
<head>
<title>Settings</title>

<style>
body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);
    padding:40px;
    animation:fadeSlideUp 0.8s ease;
}

.container{
    animation:fadeSlideUp 0.9s ease;
}

.glass-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:40px;
    color:white;
    max-width:800px;
    margin:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    transition:0.4s;
    animation:fadeSlideUp 1s ease, glow 4s infinite ease-in-out;
}

.glass-card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.4);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
    animation:floatIcon 3s ease-in-out infinite;
}

input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    font-size:18px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.2);
    color:white;
    outline:none;
    transition:0.35s ease;
    animation:fadeSlideUp 1.2s ease;
}

input::placeholder{
    color:rgba(255,255,255,0.8);
}

input:focus{
    transform:translateY(-3px) scale(1.02);
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 20px rgba(255,255,255,0.25);
}

.btn{
    display:block;
    margin:25px auto 0;
    padding:16px 30px;
    border:none;
    border-radius:15px;
    background:white;
    color:#764ba2;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    animation:fadeSlideUp 1.5s ease;
}

.btn:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

@keyframes fadeSlideUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatIcon{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes glow{
    0%,100%{
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    }
    50%{
        box-shadow:0 0 35px rgba(255,255,255,0.35);
    }
}
</style>
</head>

<body>

<div class="container">

<form method="POST" action="{% url 'settings' %}">
{% csrf_token %}

<div class="glass-card">

<h1>Settings</h1>

<input
type="text"
name="full_name"
placeholder="Full Name"
value="{{ profile.full_name|default:'' }}"
required>

<input
type="text"
name="emergency_contact"
placeholder="Emergency Contact"
value="{{ profile.emergency_contact|default:'' }}"
required>

<input
type="text"
name="primary_doctor"
placeholder="Primary Doctor"
value="{{ profile.primary_doctor|default:'' }}"
required>

<input
type="text"
name="current_medications"
placeholder="Current Medications"
value="{{ profile.current_medications|default:'' }}"
required>

<input
type="text"
name="blood_group"
placeholder="Blood Group"
value="{{ profile.blood_group|default:'' }}"
required>

<input
type="text"
name="allergies"
placeholder="Allergies"
value="{{ profile.allergies|default:'' }}"
required>

<button class="btn" type="submit">
    Save Settings
</button>

</div>

</form>

</div>

</body>
</html>
