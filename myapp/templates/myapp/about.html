<!DOCTYPE html>
<html>
<head>
<title>About Us</title>

<style>
body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2,
        #f093fb
    );
    padding:40px;
}
.glass-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    padding:30px;

    color:white;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2);

    transition:0.4s;
}
.glass-card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.3);

    border:
    1px solid rgba(255,255,255,0.4);
}
.btn{

    padding:16px 30px;

    border:none;

    border-radius:15px;

    background:white;

    color:#764ba2;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}
.btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 25px rgba(0,0,0,0.2);

}
input,
textarea{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:
    rgba(255,255,255,0.2);

    color:violet;

    font-size:17px;

    outline:none;

    margin-top:10px;
}
input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,0.8);
}
h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
max-width:1000px;
margin:auto;
text-align:center;
}

img{
width:200px;
border-radius:50%;
margin-bottom:20px;
}
@keyframes fadeSlideUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatIcon{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes glow{
    0%,100%{
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    }
    50%{
        box-shadow:0 0 35px rgba(255,255,255,0.35);
    }
}

.sidebar{
    animation:fadeSlideUp 0.7s ease;
}

.topbar{
    animation:fadeSlideUp 0.8s ease;
}

.hero{
    animation:fadeSlideUp 1s ease, glow 3s infinite ease-in-out;
}

.hero i{
    animation:floatIcon 3s infinite ease-in-out;
}

.card{
    animation:fadeSlideUp 1.1s ease;
}

.card:nth-child(2){
    animation-delay:0.1s;
}

.card:nth-child(3){
    animation-delay:0.2s;
}

.card:nth-child(4){
    animation-delay:0.3s;
}

.panel{
    animation:fadeSlideUp 1.2s ease;
}

.user,
.card,
.panel,
.sidebar a,
.hero button{
    transition:0.35s ease;
}

.user:hover,
.card:hover,
.panel:hover,
.hero button:hover{
    transform:translateY(-8px) scale(1.03);
}

.sidebar a:hover{
    transform:translateX(10px) scale(1.02);
}

.default-avatar{
    transition:0.4s ease;
}

.user:hover .default-avatar{
    transform:rotate(8deg) scale(1.08);
}
</style>
</head>

<body>

<div class="card">
<div class="glass-card">
<div class="container">
<h1>About MemoraAI</h1>

<h2>Our Mission</h2>

<p>
Helping senior citizens manage healthcare
through AI-powered assistance.
</p>

<br>

<h2>Why We Care</h2>

<p>
Healthcare should be simple,
accessible and stress-free.
</p>

<br>

<h2>Our Vision</h2>

<p>
Creating a smarter future for elderly care.
</p>

</div>

</body>
</html>
