<!DOCTYPE html>
<html>
<head>
<title>Prescriptions</title>

<style>
body{
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(
        135deg,
        #667eea,
        #764ba2,
        #f093fb
    );
    padding:40px;
}


.glass-card{
    background:rgba(255,255,255,0.15);


    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    padding:30px;

    color:white;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.2);

    transition:0.4s;
}
.glass-card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.3);

    border:
    1px solid rgba(255,255,255,0.4);
}
.btn{

    padding:16px 30px;

    border:none;

    border-radius:15px;

    background:white;

    color:#764ba2;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}
.btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 25px rgba(0,0,0,0.2);

}
input,
textarea{

    width:100%;

    padding:18px;

    border:none;

    border-radius:15px;

    background:
    rgba(255,255,255,0.2);
    color:white;

    font-size:17px;

    outline:none;

    margin-top:10px;
}
input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,0.8);
}
h1{
text-align:center;
margin-bottom:30px;
}

.upload-box{
border:3px dashed #7c3aed;
padding:60px;
text-align:center;
border-radius:20px;
margin-bottom:30px;
}

input[type=file]{
font-size:18px;
}

.medicine-card{
padding:20px;
border-radius:15px;
margin-top:20px;
}
.result-box{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
    margin-top:20px;

    white-space:pre-wrap;
    word-wrap:break-word;
    overflow-wrap:break-word;

    max-height:400px;
    overflow-y:auto;
}
@keyframes fadeSlideUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatIcon{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes glow{
    0%,100%{
        box-shadow:0 0 20px rgba(255,255,255,0.15);
    }
    50%{
        box-shadow:0 0 35px rgba(255,255,255,0.35);
    }
}
.container{
    animation:fadeSlideUp 0.7s ease;
}

.glass-card{
    animation:fadeSlideUp 0.9s ease;
}

.result-box{
    animation:fadeSlideUp 1.1s ease;
}

.medicine-card{
    animation:fadeSlideUp 1.2s ease;
}

.btn{
    animation:fadeSlideUp 1s ease;
}

input{
    animation:fadeSlideUp 0.8s ease;
}

h1{
    animation:floatIcon 3s infinite ease-in-out;
}


</style>
</head>

<body>

<div class="container">

<div class="glass-card">

<h1>Prescriptions</h1>

<div class="glass-card">

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="medicine_name"
        placeholder="Enter medicine name">

    <br><br>

    <button type="submit" class="btn">
        Search Medicine
    </button>

</form>

<div class="result-box">
    {{ medicine_info }}
</div>


</div>

</div>

</body>
</html>
